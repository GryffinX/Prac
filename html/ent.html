<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Character Entities Demo</title>

<body>

  <p>
    Less than: &lt; <br>
    Greater than: &gt; <br>
    Ampersand: &amp; <br>
    Copyright: &copy; <br>

    Single quote: &apos; <br>

  </p>

</body>
